apiVersion: apps/v1
kind: Deployment
metadata:
  name: synapseiq-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: synapseiq-frontend
  template:
    metadata:
      labels:
        app: synapseiq-frontend
    spec:
      containers:
      - name: synapseiq-frontend
        image: synapseiq-frontend:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 3000
        env:
        - name: NEXT_PUBLIC_API_URL
          value: "http://localhost:8000/api/v1"
---
apiVersion: v1
kind: Service
metadata:
  name: synapseiq-frontend-service
spec:
  type: NodePort
  selector:
    app: synapseiq-frontend
  ports:
  - port: 3000
    targetPort: 3000
    nodePort: 30000
