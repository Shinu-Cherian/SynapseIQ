apiVersion: apps/v1
kind: Deployment
metadata:
  name: synapseiq-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: synapseiq-redis
  template:
    metadata:
      labels:
        app: synapseiq-redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: redis
spec:
  type: ClusterIP
  selector:
    app: synapseiq-redis
  ports:
  - port: 6379
    targetPort: 6379
