apiVersion: apps/v1
kind: Deployment
metadata:
  name: synapseiq-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: synapseiq-postgres
  template:
    metadata:
      labels:
        app: synapseiq-postgres
    spec:
      containers:
      - name: postgres
        image: pgvector/pgvector:pg16
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_USER
          value: postgres
        - name: POSTGRES_PASSWORD
          value: postgres
        - name: POSTGRES_DB
          value: synapseiq
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
spec:
  type: ClusterIP
  selector:
    app: synapseiq-postgres
  ports:
  - port: 5432
    targetPort: 5432
